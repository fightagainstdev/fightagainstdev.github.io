<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲睿故事</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
</head>
<body>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>曲睿故事</h2>
            </div>
            <ul>
                <li><button onclick="showSection('main-section')">上传故事</button></li>
                <li><button onclick="showSection('public-square'); loadPublicSquare()">广场</button></li>
                <li><button onclick="showSection('tag-square'); loadTags()">标签广场</button></li>
                <li><button onclick="showSection('archive'); loadArchive()">我的存档</button></li>
                <li><button onclick="showSection('search-section')">搜索</button></li>
                <li><button onclick="showSection('messages-section'); loadMessagesList()">私信</button></li>
                <li><button onclick="showSection('profile-section'); loadProfile()">我的资料</button></li>
                <li><button onclick="logout()">登出</button></li>
            </ul>
        </div>

        <div class="main-content">
            <div id="auth-section" class="section" style="display: block;">
                <div class="card">
                    <h2>登录/注册</h2>
                    <div id="auth-message" style="display: none;"></div>
                    <input id="email" type="email" placeholder="邮箱">
                    <input id="password" type="password" placeholder="密码">
                    <div class="button-group">
                        <button id="register-btn" onclick="register()">注册</button>
                        <button id="login-btn" onclick="login()">登录</button>
                    </div>
                    <a href="#" onclick="resetPassword()">忘记密码？</a>
                </div>
            </div>

            <div id="main-section" class="section" style="display: none;">
                <div class="card">
                    <h2>上传照片生成故事</h2>
                    <input id="photo-upload" type="file" accept="image/*">
                    <select id="privacy">
                        <option value="public">公开</option>
                        <option value="private">私密</option>
                    </select>
                    <button onclick="uploadAndGenerate()">上传并生成</button>
                    <div id="story-output"></div>
                </div>
            </div>

            <div id="public-square" class="section" style="display: none;"></div>
            <div id="tag-square" class="section" style="display: none;"></div>
            <div id="archive" class="section" style="display: none;"></div>

            <div id="search-section" class="section" style="display: none;">
                <div class="card">
                    <h2>搜索故事</h2>
                    <div class="search-bar">
                        <input id="search-keyword" type="text" placeholder="输入关键词...">
                        <button onclick="searchStories()">搜索</button>
                    </div>
                    <div id="search-results"></div>
                </div>
            </div>

            <div id="profile-section" class="section" style="display: none;">
                <div class="card">
                    <h2>我的资料</h2>
                    <div class="profile-info">
                        <img id="avatar-preview" class="avatar" src="https://via.placeholder.com/100x100?text=Avatar" alt="Avatar">
                        <span id="username-display">加载中...</span>
                    </div>
                    <input id="username-input" type="text" placeholder="输入新昵称">
                    <input id="avatar-upload" type="file" accept="image/*">
                    <button onclick="updateProfile()">更新资料</button>
                </div>
            </div>

            <div id="messages-section" class="section" style="display: none;">
                <div class="card messages-layout">
                    <div class="conversations" id="conversations-list">
                        <h3>我关注的人</h3>
                    </div>
                    <div class="chat-panel">
                        <div class="chat-header">
                            <div class="user-info">
                                <img id="chat-target-avatar" class="avatar" src="default-avatar.png">
                                <span id="chat-target-name">未选择会话</span>
                            </div>
                        </div>
                        <div class="chat-history" id="chat-history"></div>
                        <div class="chat-input">
                            <input id="chat-input-text" type="text" placeholder="输入消息...">
                            <button onclick="sendMessage()">发送</button>
                        </div>
                        <div id="dm-tip" class="dm-tip">只有互相关注后才能私信</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
