<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Story</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Photo Story</h2>
            </div>
            <ul>
                <li><button onclick="showSection('main-section')">上传故事</button></li>
                <li><button onclick="showSection('public-square')">广场</button></li>
                <li><button onclick="showSection('tag-square')">标签广场</button></li>
                <li><button onclick="showSection('archive')">我的存档</button></li>
                <li><button onclick="showSection('search-section')">搜索</button></li>
                <li><button onclick="showSection('profile-section')">我的资料</button></li>
                <li><button onclick="logout()">登出</button></li>
            </ul>
        </div>
        <div class="main-content">
            <div id="auth-section" class="section">
                <h2>登录/注册</h2>
                <input type="email" id="email" placeholder="邮箱">
                <input type="password" id="password" placeholder="密码">
                <div class="button-group">
                    <button onclick="register()">注册</button>
                    <button onclick="login()">登录</button>
                </div>
                <a href="#" onclick="resetPassword()">忘记密码？</a>
            </div>
            <div id="main-section" class="section" style="display: none;">
                <h2>上传照片生成故事</h2>
                <input type="file" id="photo-upload" accept="image/*">
                <select id="privacy">
                    <option value="public">公开</option>
                    <option value="private">私密</option>
                </select>
                <button onclick="uploadAndGenerate()">上传并生成</button>
                <div id="story-output" class="story-output"></div>
            </div>
            <div id="public-square" class="section" style="display: none;"></div>
            <div id="tag-square" class="section" style="display: none;"></div>
            <div id="archive" class="section" style="display: none;"></div>
            <div id="search-section" class="section" style="display: none;">
                <h2>搜索故事</h2>
                <div class="search-bar">
                    <input type="text" id="search-keyword" placeholder="输入关键词">
                    <button onclick="searchStories()">搜索</button>
                </div>
                <div id="search-results"></div>
            </div>
            <div id="profile-section" class="section" style="display: none;">
                <h2>我的资料</h2>
                <div class="profile-info">
                    <img id="avatar-preview" src="default-avatar.png" alt="User avatar" class="avatar">
                    <span id="username-display">加载中...</span>
                </div>
                <input type="text" id="username-input" placeholder="昵称">
                <input type="file" id="avatar-upload" accept="image/*">
                <button onclick="updateProfile()">更新资料</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
