<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲睿故事</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>曲睿故事</h1>
        <nav>
            <a href="#" onclick="showSection('main-section')">上传故事</a>
            <a href="#" onclick="showSection('public-square')">广场</a>
            <a href="#" onclick="showSection('tag-square')">标签广场</a>
            <a href="#" onclick="showSection('archive')">我的存档</a>
            <a href="#" onclick="showSection('search-section')">搜索</a>
            <a href="#" onclick="showSection('messages-section')">私信</a>
            <a href="#" onclick="showSection('profile-section')">我的资料</a>
            <a href="#" onclick="logout()">登出</a>
        </nav>
    </header>

    <div id="auth-section">
        <h2>登录/注册</h2>
        <div>
            <input type="email" id="email" placeholder="邮箱">
            <input type="password" id="password" placeholder="密码">
            <div>
                <button id="register-btn" onclick="register()">注册</button>
                <button id="login-btn" onclick="login()">登录</button>
            </div>
            <a href="#" onclick="resetPassword()">忘记密码？</a>
        </div>
        <div id="auth-message" style="display: none;"></div>
    </div>

    <div id="main-section" style="display: none;">
        <h2>上传照片生成故事</h2>
        <input type="file" id="photo-upload" accept="image/*">
        <select id="privacy">
            <option value="public">公开</option>
            <option value="private">私密</option>
        </select>
        <button onclick="uploadAndGenerate()">上传并生成</button>
        <div id="story-output"></div>
    </div>

    <div id="public-square" style="display: none;"></div>
    <div id="tag-square" style="display: none;"></div>
    <div id="archive" style="display: none;"></div>
    <div id="search-section" style="display: none;">
        <h2>搜索故事</h2>
        <div>
            <input id="search-keyword" placeholder="输入关键词">
            <button onclick="searchStories()">搜索</button>
        </div>
        <div id="search-results"></div>
    </div>
    <div id="profile-section" style="display: none;">
        <h2>我的资料</h2>
        <div>
            <p id="username-display">加载中...</p>
            <input id="username-input" placeholder="新昵称">
            <input type="file" id="avatar-upload" accept="image/*">
            <img id="avatar-preview" src="" alt="头像预览">
            <button onclick="updateProfile()">更新资料</button>
        </div>
    </div>
    <div id="messages-section" style="display: none;">
        <h2>私信</h2>
        <div id="conversations-list"></div>
        <div>
            <img id="chat-target-avatar" src="" alt="">
            <h3 id="chat-target-name">未选择会话</h3>
            <div id="chat-history"></div>
            <div>
                <input id="chat-input-text" placeholder="输入消息...">
                <button onclick="sendMessage()">发送</button>
            </div>
            <p id="dm-tip" style="display: none;">只有互相关注后才能私信</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
    <script src="app.js"></script>
</body>
</html>
